# GitHub Actions workflow that builds binary wheels for scamp on every platform
# we care about, plus an sdist (the source tarball). Wheels and sdist are
# uploaded as workflow "artifacts" — i.e. zip files attached to the run, which
# you can download from the GitHub Actions web UI and then `twine upload` from
# your laptop.
#
# Triggered by:
#   - pushing a tag that looks like v* (the standard release pattern)
#   - clicking "Run workflow" on the GitHub Actions UI (workflow_dispatch)
#
# When you're ready to graduate to fully-automatic publishing, add a second
# job here that runs `pypa/gh-action-pypi-publish` after the build jobs
# succeed. We're intentionally not doing that yet.

name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      extra_index_url:
        description: >-
          Additional package index for cibuildwheel's install test. Needed when
          scamp's dependencies have been staged somewhere but aren't on PyPI yet
          (e.g. https://test.pypi.org/simple/ during a rehearsal) — otherwise the
          test venv can't resolve them and every wheel "fails" despite building
          fine. Leave blank for a real release.
        required: false
        default: ''

jobs:
  build_wheels:
    name: Wheels — ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native runners for both archs (no QEMU emulation needed)
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          # macOS: only the arm64 runner. GitHub's Intel runners (macos-13)
          # are deprecated and queue for hours-to-days on the free tier;
          # build x86_64 mac wheels manually on a local Intel Mac with:
          #     pipx run cibuildwheel --platform macos --archs x86_64
          # MACOSX_DEPLOYMENT_TARGET must match the runner's macOS version,
          # because Homebrew binaries get built against that — delocate refuses
          # to ship a wheel claiming compatibility with older macOS than the
          # bundled dylibs actually support.
          - os: macos-14         # Apple Silicon
            arch: arm64
            macos_deployment_target: "14.0"
          # Windows: only 64-bit. Drop x86 entirely — it's vanishing and our
          # cpp11 FluidSynth bundle is x64.
          - os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
          # Forwarded into the build/test environment (including the manylinux
          # container), so the install test can reach a staged index. Only pip
          # inside the throwaway test venv sees this; wheel contents are identical
          # either way.
          CIBW_ENVIRONMENT: ${{ inputs.extra_index_url && format('PIP_EXTRA_INDEX_URL={0}', inputs.extra_index_url) || '' }}
        # cibuildwheel reads its config from pyproject.toml's [tool.cibuildwheel]
        # sections. The `before-build` hooks defined there are what install /
        # download FluidSynth into _thirdparty/ on each platform.

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ./dist/*.tar.gz
